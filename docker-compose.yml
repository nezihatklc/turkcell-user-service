version: '3.8'

services:
  # PostgreSQL veritabanı
  postgres:
    image: postgres:16
    container_name: turkcell-postgres
    environment:
      POSTGRES_DB: turkcelldb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
    ports:
      - "5433:5432"  # 5433 dışarıdan, 5432 içeride

  # Spring Boot uygulamamız
  user-service:
    build: .
    container_name: turkcell-user-service
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/turkcelldb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: 123456
    depends_on:
      - postgres  # önce postgres başlasın